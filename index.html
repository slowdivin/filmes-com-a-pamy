<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ilovu</title>

<style>
/* Fundo responsivo da página */
body {
  margin: 0;
  min-height: 100vh; /* ocupa toda a altura da tela */
  display: flex;
  justify-content: center;
  align-items: flex-start;
  background-color: #ffe7c2; /* coloque a cor do fundo da sua imagem */
}

/* Container centralizado */
.container {
  position: relative;
  width: 100%;
  max-width: 400px; /* largura máxima no PC */
}

/* Imagem responsiva */
.container img {
  width: 100%;
  height: auto;
  display: block;
}

/* Checkboxes com corações */
input[type="checkbox"] {
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
  width: 40px;             /* tamanho clicável */
  height: 40px;
  background-color: transparent;
  cursor: pointer;
  background-image: url('coracao-vazio.png'); /* coração vazio */
  background-size: cover;
  border: none;
  position: absolute;
}

/* Quando marcado, mostra o coração cheio */
input[type="checkbox"]:checked {
  background-image: url('coracao-cheio.png');
}
</style>
</head>
<script>
var senha = prompt("Digite a senha:");

if (senha !== "ilovu") {
  document.body.innerHTML = "Acesso negado";
}
</script>
<body>
<div class="container">

  <!-- SUA IMAGEM -->
  <img src="imagem.png" alt="Checklist de Filmes">

  <!-- CHECKBOXES -->
  <input type="checkbox" style="top:250px; left:60px;">
  <input type="checkbox" style="top:300px; left:60px;">
  <input type="checkbox" style="top:350px; left:60px;">
  <input type="checkbox" style="top:400px; left:60px;">
  <input type="checkbox" style="top:450px; left:60px;">
  <input type="checkbox" style="top:500px; left:60px;">
  <input type="checkbox" style="top:550px; left:60px;">
  <input type="checkbox" style="top:600px; left:60px;">
  <input type="checkbox" style="top:650px; left:60px;">
  <input type="checkbox" style="top:700px; left:60px;">
  <input type="checkbox" style="top:750px; left:60px;">

</div>
</body>
</html>
