<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checklist de Filmes</title>
<style>
/* Estilo dos checkboxes para usar coração */
input[type="checkbox"] {
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
  width: 40px;             /* tamanho do coração */
  height: 40px;
  background-color: transparent; /* fundo transparente */
  cursor: pointer;
  background-image: url('coracao-vazio.png'); /* coração vazio */
  background-size: cover;
  border: none;
}

/* Quando marcado, mostra o coração cheio */
input[type="checkbox"]:checked {
  background-image: url('coracao-cheio.png');
}
</style>
</head>

<body style="margin:0; display:flex; justify-content:center;">

<div style="position: relative; width: 400px;">

  <!-- SUA IMAGEM -->
  <img src="imagem.png" width="100%">

  <!-- CHECKBOXES -->
  <input type="checkbox" style="position:absolute; top:250px; left:60px;">
  <input type="checkbox" style="position:absolute; top:300px; left:60px;">
  <input type="checkbox" style="position:absolute; top:350px; left:60px;">
  <input type="checkbox" style="position:absolute; top:400px; left:60px;">
  <input type="checkbox" style="position:absolute; top:450px; left:60px;">
  <input type="checkbox" style="position:absolute; top:500px; left:60px;">
  <input type="checkbox" style="position:absolute; top:550px; left:60px;">
  <input type="checkbox" style="position:absolute; top:600px; left:60px;">
  <input type="checkbox" style="position:absolute; top:650px; left:60px;">
  <input type="checkbox" style="position:absolute; top:700px; left:60px;">
  <input type="checkbox" style="position:absolute; top:750px; left:60px;"> 

</div>

</body>
</html>
