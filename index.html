<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i lov u ♡ </title>

<style>
/* Fundo responsivo da página */
body {
  margin: 0;
  min-height: 100vh; /* ocupa toda a altura da tela */
  display: flex;
  justify-content: center;
  align-items: flex-start;
  background-color: #ffe7c2; /* coloque a cor do fundo da sua imagem */
}

/* Container centralizado */
.container {
  position: relative;
  width: 100%;
  max-width: 400px; /* largura máxima no PC */
}

/* Imagem responsiva */
.container img {
  width: 125%;
  height: auto;
  display: block;
}

/* Checkboxes com corações */
input[type="checkbox"] {
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
  width: 35px;             /* tamanho clicável */
  height: 35px;
  background-color: transparent;
  cursor: pointer;
  background-image: url('coracao-vazio.png'); /* coração vazio */
  background-size: cover;
  border: none;
  position: absolute;
}

/* Quando marcado, mostra o coração cheio */
input[type="checkbox"]:checked {
  background-image: url('coracao-cheio.png');
}
</style>
</head>

if (senha !== "ilovu") {   // Troque "1234" pela senha que você quiser

}
</script>
